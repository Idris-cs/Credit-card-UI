<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">
                <img src="images/card.png" alt="Logo">
                <h5>Master Card</h5>
            </span>

            <img src="images/chip.png" alt="chip" class="chip">
        </header>

        <div class="card-details">
            <div class="name-number">
                <h6>Card Number</h6>
                <h5 class="number">1234 5678 9012 3456</h5>
                <h5 class="name">IDrissa Kargbo</h5>
            </div>
            <div class="valid-date">
                <h6>Valid Date</h6>
                <h5>05/26</h5>
            </div>
        </div>
    </div>
    
</body>
</html>
